<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票分析平台</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 布局样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f5f7fa; display: flex; }
        #app { display: flex; width: 100%; height: 100vh; }
        .sidebar { width: 15%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; color: white; }
        .sidebar .logo h1 { font-size: 24px; margin-bottom: 30px; }
        .nav-items { margin-bottom: 30px; }
        .nav-item { padding: 12px; margin-bottom: 5px; cursor: pointer; border-radius: 6px; transition: all 0.3s; }
        .nav-item:hover { background: rgba(255,255,255,0.1); }
        .nav-item.active { background: rgba(255,255,255,0.2); font-weight: bold; }
        .stock-selector { margin-top: 20px; }
        .stock-selector select { width: 100%; padding: 10px; border-radius: 6px; border: none; font-size: 14px; }
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        /* 移动端Sidebar - 变为顶部页头，水平布局 */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                flex-direction: row;
                display: flex;
                align-items: center;
                gap: 15px;
                padding: 10px 15px;
            }

            #app {
                flex-direction: column;
            }

            .sidebar .logo {
                flex-shrink: 0;
                margin-bottom: 0;
            }

            .sidebar .logo h1 {
                font-size: 16px;
                margin-bottom: 0;
            }

            .sidebar .logo p {
                display: none;
            }

            .nav-items {
                display: flex;
                flex-wrap: wrap;
                gap: 5px;
                margin-bottom: 0;
                flex: 1;
            }

            .nav-item {
                padding: 5px 10px;
                font-size: 11px;
                margin-bottom: 0;
            }

            .stock-selector {
                margin-top: 0;
                flex-shrink: 0;
            }

            .stock-selector select {
                font-size: 11px;
                padding: 5px 8px;
            }
        }

        @media (max-width: 480px) {
            .sidebar {
                padding: 8px 12px;
                gap: 10px;
            }

            .sidebar .logo h1 {
                font-size: 14px;
            }

            .nav-items {
                gap: 3px;
            }

            .nav-item {
                padding: 4px 8px;
                font-size: 10px;
            }

            .stock-selector select {
                font-size: 10px;
                padding: 4px 6px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <sidebar></sidebar>
        <div class="content">
            <component :is="currentPage"></component>
        </div>
    </div>

    <!-- CDN Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

    <!-- Application Code -->
    <script src="js/store.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/components/price-chart.js"></script>
    <script src="js/components/radar-chart.js"></script>
    <script src="js/components/agent-flow-chart.js"></script>
    <script src="js/components/prediction-accuracy-chart.js"></script>
    <script src="js/components/sidebar.js"></script>
    <script src="js/components/analysis-page.js"></script>
    <script src="js/components/prediction-page.js"></script>
    <script src="js/components/history-page.js"></script>
    <script src="js/components/review-page.js"></script>
    <script src="js/components/macro-analysis-page.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
