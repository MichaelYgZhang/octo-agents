agents:
  planner:
    enabled: true
    timeout: 600

  data_collector:
    enabled: true
    timeout: 300
    sources:
      - akshare
      - tushare
      - web_scraper

  fundamental_analyst:
    enabled: true
    timeout: 300
    weight: 0.30

  quant_analyst:
    enabled: true
    timeout: 300
    weight: 0.25

  news_analyst:
    enabled: true
    timeout: 300
    weight: 0.25

  risk_analyst:
    enabled: true
    timeout: 300
    weight: 0.20

llm:
  provider: "anthropic"
  model: "claude-sonnet-4-6"
  temperature: 0.7
  max_tokens: 4096
  cache_ttl: 86400

data_sources:
  akshare:
    enabled: true

  tushare:
    enabled: true
    token_env: "TUSHARE_TOKEN"

  web_scraper:
    enabled: true
    sources:
      - name: "sina_finance"
        url: "https://finance.sina.com.cn"
        type: "rss"
      - name: "eastmoney"
        url: "https://www.eastmoney.com"
        type: "html"
