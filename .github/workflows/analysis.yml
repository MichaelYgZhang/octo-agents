name: 股票分析自动化任务

on:
  schedule:
    # 任务1：每日北京时间08:00 - 宏观分析文章
    - cron: '0 0 * * *'      # UTC 0:00 = 北京时间 08:00
    # 任务2：每日北京时间18:00 - 预测次日股价并复盘
    - cron: '0 10 * * *'     # UTC 10:00 = 北京时间 18:00
  workflow_dispatch:          # 手动触发

jobs:
  scheduled-task:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0

    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 验证API密钥配置
      run: |
        if [ -z "${{ secrets.DEEPSEEK_API_KEY }}" ]; then
          echo "::error::DEEPSEEK_API_KEY secret is not configured. Please add it in Settings → Secrets → Actions"
          exit 1
        fi
        echo "API密钥配置验证通过"

    - name: 判断并执行定时任务
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: |
        FAILED=0

        echo "当前UTC时间: $(date -u)"

        # 手动触发时执行所有任务
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "手动触发：执行所有任务"
          python3 backend/macro_article_generator.py || FAILED=1
          python3 src/automation/daily_prediction.py || FAILED=1
          python3 src/automation/scheduler.py || FAILED=1
        else
          # 简化的时间判断逻辑 - 只判断小时
          CURRENT_HOUR=$(date -u +"%H")

          echo "UTC小时: $CURRENT_HOUR"

          # 任务1：UTC 0点 - 宏观分析文章（北京时间8:00）
          if [ "$CURRENT_HOUR" = "00" ]; then
            echo "执行任务：生成宏观分析文章"
            python3 backend/macro_article_generator.py || FAILED=1
          fi

          # 任务2：UTC 10点 - 预测和复盘（北京时间18:00）
          if [ "$CURRENT_HOUR" = "10" ]; then
            echo "执行任务：预测次日股价"
            python3 src/automation/daily_prediction.py || FAILED=1
            echo "执行任务：生成复盘报告"
            python3 src/automation/scheduler.py || FAILED=1
          fi
        fi

        if [ $FAILED -eq 1 ]; then
          echo "::error::One or more tasks failed"
          exit 1
        fi

    - name: 提交分析结果
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        git add -A

        if git diff --staged --quiet; then
          echo "没有新的变更需要提交"
        else
          git commit -m "chore: 自动化任务执行 - $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main
          echo "变更已提交并推送到GitHub"
        fi

    - name: 上传任务日志
      uses: actions/upload-artifact@v4
      with:
        name: task-logs
        path: logs/
        retention-days: 7
      if: always()

  deploy-pages:
    needs: scheduled-task
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
    - name: 检出main分支
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0

    - name: 检出gh-pages分支的data目录
      run: |
        git fetch origin gh-pages
        git checkout origin/gh-pages -- data/ || echo "No data directory found"

    - name: 同步最新数据文件
      run: |
        # 从main分支复制最新的data文件
        git checkout origin/main -- data/ || echo "No data on main"
        
    - name: 部署到GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./frontend
        publish_branch: gh-pages
        keep_files: true  # 保留现有文件（包括data目录）
