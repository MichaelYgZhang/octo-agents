name: 股票分析自动化任务

on:
  schedule:
    # 任务1：每日08:00 - 宏观分析文章
    - cron: '0 0 * * *'      # UTC 0:00 = 北京时间 08:00
    # 任务2：每日16:30 - 预测次日股价
    - cron: '30 8 * * *'     # UTC 8:30 = 北京时间 16:30
    # 任务3：每日17:00 - 复盘昨日预测
    - cron: '0 9 * * *'      # UTC 9:00 = 北京时间 17:00
    # 任务4：每周五18:00 - 周报总结
    - cron: '0 10 * * 5'     # UTC 10:00 周五 = 北京时间 18:00 周五
  workflow_dispatch:          # 手动触发

jobs:
  scheduled-task:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0

    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 验证API密钥配置
      run: |
        if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
          echo "::error::ANTHROPIC_API_KEY secret is not configured. Please add it in Settings → Secrets → Actions"
          exit 1
        fi
        echo "API密钥配置验证通过"

    - name: 判断并执行定时任务
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: |
        CURRENT_HOUR=$(date -u +"%H")
        CURRENT_MINUTE=$(date -u +"%M")
        CURRENT_DAY=$(date -u +"%u")
        FAILED=0

        echo "当前UTC时间: $(date -u)"
        echo "UTC时间: $CURRENT_HOUR:$CURRENT_MINUTE, 星期: $CURRENT_DAY"

        # 任务1：UTC 0:00-0:29 - 宏观分析文章
        if [ "$CURRENT_HOUR" = "00" ] && [ "$CURRENT_MINUTE" -ge 0 ] && [ "$CURRENT_MINUTE" -lt 30 ]; then
          echo "执行任务：生成宏观分析文章"
          python3 backend/macro_article_generator.py || FAILED=1
        fi

        # 任务2：UTC 8:30-8:59 - 次日预测
        if [ "$CURRENT_HOUR" = "08" ] && [ "$CURRENT_MINUTE" -ge 30 ]; then
          echo "执行任务：预测次日股价"
          python3 src/automation/daily_prediction.py || FAILED=1
        fi

        # 任务3：UTC 9:00-9:29 - 复盘报告
        if [ "$CURRENT_HOUR" = "09" ] && [ "$CURRENT_MINUTE" -ge 0 ] && [ "$CURRENT_MINUTE" -lt 30 ]; then
          echo "执行任务：生成复盘报告"
          python3 src/automation/scheduler.py || FAILED=1
        fi

        # 任务4：UTC 10:00-10:29 周五 - 周报总结
        if [ "$CURRENT_HOUR" = "10" ] && [ "$CURRENT_MINUTE" -ge 0 ] && [ "$CURRENT_MINUTE" -lt 30 ] && [ "$CURRENT_DAY" = "5" ]; then
          echo "执行任务：生成周报总结"
          python3 -c "from src.automation.scheduler import AutomatedScheduler; s = AutomatedScheduler(); s.generate_weekly_review()" || FAILED=1
        fi

        if [ $FAILED -eq 1 ]; then
          echo "::warning::One or more tasks failed"
        fi

    - name: 提交分析结果
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/*.json data/history/ reports/ logs/ 2>/dev/null || true
        if git diff --quiet && git diff --staged --quiet; then
          echo "没有新的变更需要提交"
        else
          git commit -m "chore: 自动化任务执行 - $(date +'%Y-%m-%d %H:%M:%S')"
          git pull --rebase origin main
          git push origin main
          echo "变更已提交并推送到GitHub"
        fi

    - name: 上传任务日志
      uses: actions/upload-artifact@v4
      with:
        name: task-logs
        path: logs/
        retention-days: 7
      if: always()

  deploy-pages:
    needs: scheduled-task
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 部署到GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./frontend
        publish_branch: gh-pages
